<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>✦ RHYTHM·CUBE · 双倍脉冲 ✦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background: #0a0e1a;
            color: #e0e8f0;
            font-family: 'VT323', 'Courier New', monospace;
            overflow: hidden;
            height: 100dvh;
            width: 100dvw;
            user-select: none;
            touch-action: none;
            position: fixed;
        }

        #ascii-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: #0a0e1a;
            opacity: 0.5;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100dvw;
            position: relative;
            z-index: 1;
            pointer-events: none;
        }
        #app > * {
            pointer-events: auto;
        }

        /* 毛玻璃顶部 */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 12px;
            margin: 6px 8px 0 8px;
            border-radius: 30px;
            flex-shrink: 0;
            z-index: 50;
            font-size: 13px;
            letter-spacing: 0.5px;
            color: #c8e8ff;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.20), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 2px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 16px;
            color: #88ddff;
            text-shadow: 0 0 12px rgba(100, 200, 255, 0.15);
        }
        .logo span { color: #c8e8ff; font-size: 14px; letter-spacing: 1px; }
        .logo .suit { font-size: 18px; color: #88ddff; }

        .stats {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .stats .item {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 2px 8px 2px 6px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .stats .item .label {
            display: none;
        }
        .stats .item .value {
            font-size: 16px;
            font-weight: bold;
            color: #88ddff;
            text-shadow: 0 0 12px rgba(100, 200, 255, 0.10);
            min-width: 20px;
        }

        /* 主体区域 */
        #main-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: transparent;
            margin: 6px 8px 6px 8px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        #three-container {
            width: 100%;
            height: 100%;
            display: block;
            position: relative;
            z-index: 2;
            border-radius: 30px;
            overflow: hidden;
        }

        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* ---- 横向音游判定区（左侧） ---- */
        #judge-zone {
            position: absolute;
            left: 12%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 60%;
            background: rgba(0, 212, 255, 0.08);
            border: 2px solid rgba(0, 212, 255, 0.20);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
            pointer-events: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #judge-zone.active {
            border-color: rgba(100, 200, 255, 0.60);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.15);
        }
        #judge-zone .label {
            writing-mode: vertical-rl;
            letter-spacing: 4px;
            color: rgba(180, 210, 230, 0.25);
            font-size: 12px;
        }

        /* ---- 卡牌插槽区域（在音游轴上方） ---- */
        #card-slot-area {
            position: absolute;
            left: 10%;
            right: 10%;
            top: 6%;
            height: 44px;
            display: flex;
            gap: 6px;
            justify-content: center;
            pointer-events: auto;
            z-index: 26;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 2px 8px;
            backdrop-filter: blur(4px);
            border: 1px dashed rgba(255, 255, 255, 0.06);
        }
        .slot-place {
            width: 44px;
            height: 38px;
            border-radius: 20px;
            border: 2px dashed rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            cursor: grab;
            position: relative;
            touch-action: none;
        }
        .slot-place.dropped {
            border-color: rgba(100, 200, 255, 0.40);
            background: rgba(100, 200, 255, 0.06);
            border-style: solid;
            color: #88ddff;
            font-size: 14px;
            cursor: default;
        }
        .slot-place.dropped .card-icon {
            font-size: 18px;
        }
        .slot-place .card-name {
            display: none;
        }
        .slot-place.dropped .card-name {
            display: inline;
            font-size: 10px;
            margin-left: 2px;
            color: #88ddff;
        }
        .slot-place.drag-over {
            border-color: #88ddff;
            background: rgba(100, 200, 255, 0.10);
            transform: scale(1.05);
        }

        /* ---- 横向滚动字母容器 ---- */
        #scroll-container-h {
            position: absolute;
            top: 18%;
            left: 0;
            width: 100%;
            height: 64%;
            pointer-events: none;
            overflow: visible;
        }
        .note-h {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 46px;
            border-radius: 23px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #c8e8ff;
            text-shadow: 0 0 12px rgba(100, 200, 255, 0.08);
            pointer-events: auto;
            will-change: transform, left;
            font-family: 'VT323', monospace;
            transition: background 0.2s, border-color 0.2s, transform 0.12s;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.20);
            cursor: pointer;
            touch-action: manipulation;
        }
        .note-h.in-judge {
            border-color: rgba(100, 200, 255, 0.40);
            background: rgba(100, 200, 255, 0.06);
            transform: translateY(-50%) scale(1.06);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.06);
        }
        .note-h.miss {
            border-color: rgba(255, 100, 100, 0.30);
            background: rgba(255, 100, 100, 0.06);
            transform: translateY(-50%) scale(0.85);
        }
        .note-h.crit {
            border-color: rgba(100, 200, 255, 0.60);
            background: rgba(100, 200, 255, 0.10);
            transform: translateY(-50%) scale(1.25);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.15);
        }

        /* 暴击特效 */
        #crit-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #88ddff;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.50), 0 0 60px rgba(50, 150, 255, 0.20);
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            font-family: 'VT323', monospace;
            letter-spacing: 4px;
        }
        #crit-effect.show {
            opacity: 1;
            animation: critPop 0.6s ease-out forwards;
        }
        @keyframes critPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.6); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
        }

        /* 卡牌弹出 */
        #card-popup {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            border-radius: 24px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s ease, transform 0.35s ease;
            transform: translateY(-50%) translateX(20px);
            z-index: 35;
            font-family: 'VT323', monospace;
        }
        #card-popup.show {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        #card-popup .card-title {
            color: #88ddff;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-shadow: 0 0 16px rgba(100, 200, 255, 0.10);
        }
        #card-popup .card-effect {
            color: #88ddff;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 4px;
            margin-top: 2px;
        }
        #card-popup .card-sub {
            color: rgba(180, 210, 230, 0.40);
            font-size: 12px;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        #card-popup .card-suit {
            position: absolute;
            top: -8px;
            right: 12px;
            font-size: 20px;
            color: rgba(180, 210, 230, 0.10);
        }

        /* 底部控制栏 */
        #bottom-controls {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: auto;
            z-index: 40;
            padding: 8px 12px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.20), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        #bottom-controls button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            color: #c8e8ff;
            padding: 4px 12px;
            font-size: 13px;
            font-family: 'VT323', monospace;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            touch-action: manipulation;
        }
        #bottom-controls button:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.20);
            color: #88ddff;
            transform: scale(1.02);
        }
        #bottom-controls button.primary {
            background: rgba(100, 200, 255, 0.08);
            border-color: rgba(100, 200, 255, 0.20);
            color: #88ddff;
        }
        #bottom-controls button.primary:hover {
            background: rgba(100, 200, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.30);
        }
        #bottom-controls button.danger {
            border-color: rgba(255, 100, 100, 0.15);
            color: rgba(255, 150, 150, 0.6);
        }
        #bottom-controls button.danger:hover {
            border-color: rgba(255, 100, 100, 0.30);
            color: #ff8888;
            background: rgba(255, 100, 100, 0.05);
        }
        #bottom-controls button.toggle {
            border-color: rgba(100, 200, 255, 0.15);
            color: #88ddff88;
        }
        #bottom-controls button.toggle.active {
            border-color: rgba(100, 200, 255, 0.60);
            color: #88ddff;
            background: rgba(100, 200, 255, 0.10);
        }

        /* 右侧卡牌槽（可拖拽） */
        #card-slot {
            position: absolute;
            right: 12px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: auto;
            z-index: 25;
            align-items: flex-end;
        }
        .slot-card {
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px;
            color: #c8e8ff;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'VT323', monospace;
            transition: 0.2s;
            cursor: grab;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            user-select: none;
            touch-action: none;
        }
        .slot-card:active {
            cursor: grabbing;
        }
        .slot-card .icon { font-size: 14px; }
        .slot-card .name { color: #88ddff; letter-spacing: 1px; font-size: 11px; }
        .slot-card .effect { display: none; }

        /* 适配小屏 */
        @media (max-width: 480px) {
            #top-bar {
                padding: 2px 8px;
                margin: 4px 4px 0 4px;
                border-radius: 20px;
                font-size: 11px;
            }
            .logo { font-size: 13px; gap: 2px; }
            .logo span { font-size: 11px; }
            .logo .suit { font-size: 14px; }
            .stats .item { padding: 1px 6px; }
            .stats .item .value { font-size: 13px; min-width: 16px; }
            #main-area { margin: 4px; border-radius: 20px; }
            #three-container { border-radius: 20px; }
            #judge-zone { width: 10px; height: 50%; left: 10%; }
            #judge-zone .label { font-size: 9px; letter-spacing: 2px; }
            #card-slot-area { height: 36px; gap: 4px; padding: 2px 4px; left: 8%; right: 8%; top: 4%; }
            .slot-place { width: 36px; height: 30px; border-radius: 16px; font-size: 8px; }
            .slot-place.dropped { font-size: 11px; }
            .slot-place.dropped .card-icon { font-size: 14px; }
            .slot-place.dropped .card-name { font-size: 8px; }
            #scroll-container-h { top: 16%; height: 66%; }
            .note-h { width: 36px; height: 36px; border-radius: 18px; font-size: 18px; }
            #crit-effect { font-size: 36px; }
            #card-popup { width: 130px; right: 10px; padding: 8px 12px; }
            #card-popup .card-title { font-size: 15px; }
            #card-popup .card-effect { font-size: 12px; }
            #card-popup .card-sub { font-size: 10px; }
            #bottom-controls { padding: 4px 8px; gap: 4px; bottom: 10px; }
            #bottom-controls button { font-size: 11px; padding: 2px 8px; }
            #card-slot { right: 6px; bottom: 60px; gap: 4px; }
            .slot-card { padding: 2px 8px 2px 4px; font-size: 10px; }
            .slot-card .icon { font-size: 12px; }
            .slot-card .name { font-size: 9px; }
        }
    </style>
</head>
<body>

<canvas id="ascii-bg"></canvas>

<div id="app">

    <div id="top-bar">
        <div class="logo">
            <span class="suit">✦</span>
            <span>RHYTHM·CUBE</span>
        </div>
        <div class="stats">
            <div class="item"><span class="label">✦</span><span class="value gold" id="scoreDisplay">0</span></div>
            <div class="item"><span class="label">◈</span><span class="value green" id="comboDisplay">0</span></div>
            <div class="item"><span class="label">▣</span><span class="value cyan" id="cardCountDisplay">0</span></div>
            <div class="item"><span class="label">⏣</span><span class="value" id="statusDisplay" style="font-size:13px; color:rgba(180,210,230,0.40);">待命</span></div>
        </div>
    </div>

    <div id="main-area">
        <div id="three-container"></div>

        <div id="game-overlay">
            <!-- 横向判定区 -->
            <div id="judge-zone">
                <span class="label">JUDGE</span>
            </div>

            <!-- 卡牌插槽区 -->
            <div id="card-slot-area"></div>

            <!-- 横向滚动容器 -->
            <div id="scroll-container-h"></div>

            <!-- 暴击特效 -->
            <div id="crit-effect">⚡ CRIT!</div>

            <!-- 卡牌弹出 -->
            <div id="card-popup">
                <div class="card-suit">✦</div>
                <div class="card-title" id="popupTitle">🃏 小丑牌</div>
                <div class="card-effect" id="popupEffect">+5 暴击倍率</div>
                <div class="card-sub" id="popupSub">「 节奏大师 」</div>
            </div>

            <!-- 右侧卡牌槽（可拖拽） -->
            <div id="card-slot"></div>

            <!-- 底部控制 -->
            <div id="bottom-controls">
                <button id="startBtn" class="primary">▶ 开始</button>
                <button id="pauseBtn">⏸ 暂停</button>
                <button id="resetBtn" class="danger">↺ 重置</button>
                <button id="scrambleBtn">🎲 打乱</button>
                <button id="cardTestBtn">🃏 抽卡</button>
                <button id="toggleRotateBtn" class="toggle active">🔄 自转</button>
            </div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
}
</script>

<script type="module">
// ================================================================
//  0. ASCII 代码雨背景
// ================================================================
const bgCanvas = document.getElementById('ascii-bg');
const ctx = bgCanvas.getContext('2d');
let W, H;

function resizeBg() {
    W = window.innerWidth;
    H = window.innerHeight;
    bgCanvas.width = W;
    bgCanvas.height = H;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?/';
const COLUMN_WIDTH = 18;
const FONT_SIZE = 20;
const SPEED = 0.8;

let cols = Math.ceil(W / COLUMN_WIDTH);
let drops = [];

function initDrops() {
    drops = [];
    for (let i = 0; i < cols; i++) {
        drops.push({
            y: Math.random() * -H,
            length: 10 + Math.floor(Math.random() * 25),
            speed: 0.5 + Math.random() * 1.2,
            chars: [],
        });
        const drop = drops[i];
        for (let j = 0; j < drop.length; j++) {
            drop.chars[j] = CHARS[Math.floor(Math.random() * CHARS.length)];
        }
    }
}
initDrops();

function drawRain() {
    ctx.fillStyle = 'rgba(10, 14, 26, 0.08)';
    ctx.fillRect(0, 0, W, H);

    ctx.font = `${FONT_SIZE}px 'VT323', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (let i = 0; i < drops.length; i++) {
        const drop = drops[i];
        const x = i * COLUMN_WIDTH + COLUMN_WIDTH / 2;
        drop.y += drop.speed * SPEED;
        if (drop.y > H + 20) {
            drop.y = -drop.length * FONT_SIZE - Math.random() * 100;
            drop.speed = 0.5 + Math.random() * 1.2;
            drop.length = 10 + Math.floor(Math.random() * 25);
            drop.chars = [];
            for (let j = 0; j < drop.length; j++) {
                drop.chars[j] = CHARS[Math.floor(Math.random() * CHARS.length)];
            }
        }
        for (let j = 0; j < drop.length; j++) {
            const yPos = drop.y - j * FONT_SIZE;
            if (yPos < -FONT_SIZE || yPos > H + FONT_SIZE) continue;
            const char = drop.chars[j] || ' ';
            const brightness = 1 - j / drop.length;
            const blue = Math.floor(80 + 175 * brightness);
            const alpha = 0.2 + 0.7 * brightness;
            ctx.fillStyle = `rgba(0, ${Math.floor(blue*0.6)}, ${Math.floor(180 + 75*brightness)}, ${alpha})`;
            if (j === 0) {
                ctx.fillStyle = `rgba(100, 220, 255, 0.90)`;
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 16;
            } else {
                ctx.shadowBlur = 0;
            }
            ctx.fillText(char, x, yPos);
            ctx.shadowBlur = 0;
        }
    }
    if (Math.random() < 0.01) {
        ctx.fillStyle = 'rgba(0, 212, 255, 0.03)';
        ctx.fillRect(0, Math.random() * H, W, 2 + Math.random() * 4);
    }
    requestAnimationFrame(drawRain);
}
drawRain();

window.addEventListener('resize', () => {
    resizeBg();
    cols = Math.ceil(W / COLUMN_WIDTH);
    const oldDrops = drops;
    drops = [];
    for (let i = 0; i < cols; i++) {
        if (i < oldDrops.length) {
            drops.push(oldDrops[i]);
        } else {
            drops.push({
                y: Math.random() * -H,
                length: 10 + Math.floor(Math.random() * 25),
                speed: 0.5 + Math.random() * 1.2,
                chars: [],
            });
            const drop = drops[i];
            for (let j = 0; j < drop.length; j++) {
                drop.chars[j] = CHARS[Math.floor(Math.random() * CHARS.length)];
            }
        }
    }
});

// ================================================================
//  1. Three.js 魔方 — 圆形色块
// ================================================================
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('three-container');
const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(4, 3, 6);
camera.lookAt(0, 0, 0);

function createCircleTexture(color, size = 128) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    const center = size / 2;
    const radius = size * 0.42;
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, Math.PI * 2);
    ctx.closePath();
    const c = new THREE.Color(color);
    ctx.fillStyle = `rgb(${c.r*255|0}, ${c.g*255|0}, ${c.b*255|0})`;
    ctx.fill();
    const grad = ctx.createRadialGradient(center*0.7, center*0.7, 0, center, center, radius);
    grad.addColorStop(0, 'rgba(255,255,255,0.2)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fill();
    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

const cubeSize = 0.88;
const gap = 0.07;
const spacing = cubeSize + gap;
const faceColors = [
    0xff2244, 0xff8800, 0xeeeeff, 0xffdd00, 0x22dd66, 0x2266ff
];
let cubes = [];

const textures = faceColors.map(c => createCircleTexture(c));

function makeMat(x, y, z) {
    const matConfig = (colorIdx) => ({
        map: textures[colorIdx],
        transparent: true,
        opacity: 0.85,
        roughness: 0.3,
        metalness: 0.2,
        emissive: new THREE.Color(faceColors[colorIdx]).multiplyScalar(0.1),
        side: THREE.DoubleSide,
        depthWrite: true,
    });
    const mats = [
        (x===1) ? new THREE.MeshStandardMaterial(matConfig(0)) : new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 }),
        (x===-1) ? new THREE.MeshStandardMaterial(matConfig(1)) : new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 }),
        (y===1) ? new THREE.MeshStandardMaterial(matConfig(2)) : new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 }),
        (y===-1) ? new THREE.MeshStandardMaterial(matConfig(3)) : new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 }),
        (z===1) ? new THREE.MeshStandardMaterial(matConfig(4)) : new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 }),
        (z===-1) ? new THREE.MeshStandardMaterial(matConfig(5)) : new THREE.MeshStandardMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.3 }),
    ];
    return mats;
}

function buildCube() {
    cubes.forEach(c => scene.remove(c));
    cubes = [];
    for (let x = -1; x <= 1; x++) {
        for (let y = -1; y <= 1; y++) {
            for (let z = -1; z <= 1; z++) {
                if (x === 0 && y === 0 && z === 0) continue;
                const mats = makeMat(x, y, z);
                const geo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
                const mesh = new THREE.Mesh(geo, mats);
                mesh.position.set(x * spacing, y * spacing, z * spacing);
                mesh.userData = { ix: x, iy: y, iz: z };
                scene.add(mesh);
                cubes.push(mesh);
            }
        }
    }
}
buildCube();

const particleCount = 600;
const particleGeo = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleSpeeds = [];
for (let i = 0; i < particleCount; i++) {
    const radius = 2.5 + Math.random() * 1.0;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    particlePos[i*3] = radius * Math.sin(phi) * Math.cos(theta);
    particlePos[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
    particlePos[i*3+2] = radius * Math.cos(phi);
    const color = new THREE.Color().setHSL(0.55 + Math.random()*0.2, 0.8, 0.5 + Math.random()*0.3);
    particleColors[i*3] = color.r;
    particleColors[i*3+1] = color.g;
    particleColors[i*3+2] = color.b;
    particleSpeeds.push({
        theta: 0.001 + Math.random() * 0.003,
        phi: 0.001 + Math.random() * 0.003,
    });
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
    size: 0.05,
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
});
const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

const particleAngles = [];
for (let i = 0; i < particleCount; i++) {
    const pos = particleGeo.attributes.position.array;
    const r = Math.sqrt(pos[i*3]*pos[i*3] + pos[i*3+1]*pos[i*3+1] + pos[i*3+2]*pos[i*3+2]);
    const theta = Math.atan2(pos[i*3+1], pos[i*3]);
    const phi = Math.acos(pos[i*3+2] / r);
    particleAngles.push({ r, theta, phi });
}

// ---- 魔方旋转逻辑 ----
let isAnimating = false;
const queue = [];

function getCubesOnLayer(axis, layerIndex) {
    const eps = 0.01;
    const result = [];
    for (const cube of cubes) {
        let pos;
        if (axis === 'x') pos = cube.position.x;
        else if (axis === 'y') pos = cube.position.y;
        else if (axis === 'z') pos = cube.position.z;
        if (Math.abs(pos - layerIndex * spacing) < eps) {
            result.push(cube);
        }
    }
    return result;
}

function animateRotation(axis, layerIndex, angle, duration = 280) {
    return new Promise((resolve) => {
        const layerCubes = getCubesOnLayer(axis, layerIndex);
        if (layerCubes.length === 0) { resolve(); return; }
        const group = new THREE.Group();
        layerCubes.forEach(cube => {
            scene.remove(cube);
            group.add(cube);
        });
        scene.add(group);

        const rotAxis = new THREE.Vector3(axis==='x'?1:0, axis==='y'?1:0, axis==='z'?1:0);
        const startQuat = group.quaternion.clone();
        const endQuat = new THREE.Quaternion().setFromAxisAngle(rotAxis, angle).multiply(startQuat);
        const startTime = performance.now();

        function update() {
            const now = performance.now();
            let t = Math.min((now - startTime) / duration, 1);
            const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
            group.quaternion.slerpQuaternions(startQuat, endQuat, ease);
            if (t < 1) {
                requestAnimationFrame(update);
            } else {
                group.quaternion.copy(endQuat);
                group.updateMatrixWorld(true);
                const children = [...group.children];
                children.forEach(cube => {
                    const wp = new THREE.Vector3();
                    const wq = new THREE.Quaternion();
                    const ws = new THREE.Vector3();
                    cube.getWorldPosition(wp);
                    cube.getWorldQuaternion(wq);
                    cube.getWorldScale(ws);
                    group.remove(cube);
                    cube.position.copy(wp);
                    cube.quaternion.copy(wq);
                    cube.scale.copy(ws);
                    scene.add(cube);
                    cube.userData.ix = Math.round(cube.position.x / spacing);
                    cube.userData.iy = Math.round(cube.position.y / spacing);
                    cube.userData.iz = Math.round(cube.position.z / spacing);
                });
                scene.remove(group);
                resolve();
            }
        }
        update();
    });
}

async function processQueue() {
    if (isAnimating) return;
    isAnimating = true;
    while (queue.length > 0) {
        const { axis, layerIndex, angle } = queue.shift();
        await animateRotation(axis, layerIndex, angle);
    }
    isAnimating = false;
}

function enqueueRotation(axis, layerIndex, angle) {
    queue.push({ axis, layerIndex, angle });
    if (!isAnimating) processQueue();
}

function rotateFace(face, dir = 1) {
    const angle = -dir * Math.PI / 2;
    switch(face) {
        case 'U': enqueueRotation('y', 1, angle); break;
        case 'D': enqueueRotation('y', -1, -angle); break;
        case 'R': enqueueRotation('x', 1, angle); break;
        case 'L': enqueueRotation('x', -1, -angle); break;
        case 'F': enqueueRotation('z', 1, angle); break;
        case 'B': enqueueRotation('z', -1, -angle); break;
        default: break;
    }
}

// ---- 暴击脉冲（接受强度参数，默认1.0） ----
let critPulse = 0;
function pulseArt(intensity = 1.0) {
    critPulse = Math.max(critPulse, intensity);
}

// ---- 3D 动画 ----
let time = 0;
function animateScene() {
    requestAnimationFrame(animateScene);
    time += 0.005;

    const positions = particleSystem.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        const angle = particleAngles[i];
        angle.theta += particleSpeeds[i].theta * 0.5;
        angle.phi += particleSpeeds[i].phi * 0.3;
        const r = angle.r + Math.sin(time * 0.5 + i) * 0.03;
        positions[i*3] = r * Math.sin(angle.phi) * Math.cos(angle.theta);
        positions[i*3+1] = r * Math.sin(angle.phi) * Math.sin(angle.theta);
        positions[i*3+2] = r * Math.cos(angle.phi);
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;

    // 脉冲响应（强度由 critPulse 控制，1.0 普通，2.0 双倍）
    if (critPulse > 0.01) {
        const scaleFactor = 1 + critPulse * 0.06; // 1.06 或 1.12
        cubes.forEach(cube => cube.scale.set(scaleFactor, scaleFactor, scaleFactor));
        particleMat.size = 0.05 + critPulse * 0.04;
        particleMat.opacity = 0.7 + critPulse * 0.1;
        const colors = particleSystem.geometry.attributes.color.array;
        for (let i = 0; i < particleCount; i++) {
            const c = new THREE.Color().setHSL(0.55 + critPulse * 0.15, 0.9, 0.6 + critPulse * 0.15);
            colors[i*3] = c.r;
            colors[i*3+1] = c.g;
            colors[i*3+2] = c.b;
        }
        particleSystem.geometry.attributes.color.needsUpdate = true;
        critPulse *= 0.95;
    } else {
        critPulse = 0;
        cubes.forEach(cube => cube.scale.set(1, 1, 1));
        particleMat.size = 0.05;
        particleMat.opacity = 0.7;
        const colors = particleSystem.geometry.attributes.color.array;
        for (let i = 0; i < particleCount; i++) {
            const c = new THREE.Color().setHSL(0.55 + Math.random()*0.2, 0.8, 0.5 + Math.random()*0.3);
            colors[i*3] = c.r;
            colors[i*3+1] = c.g;
            colors[i*3+2] = c.b;
        }
        particleSystem.geometry.attributes.color.needsUpdate = true;
    }

    orbitControls.update();
    renderer.render(scene, camera);
}
animateScene();

    { id: 'joker3', name: '闪电小丑', effect: '暴击时双倍得分', desc: '电光石火！', icon: '⚡' },
    { id: 'joker4', name: '百变小丑', effect: '随机 +2~8 分', desc: '命运之轮', icon: '🃏' },
    { id: 'joker5', name: '星尘小丑', effect: '每张卡牌 +1 分', desc: '群星之力', icon: '🌟' },

let collectedCards = [];
let cardEffects = {
    critBonus: 0,
    comboBonus: 0,
    doubleCrit: false,
    randomBonus: 0,
    perCardBonus: 0,
    missBonus: 0,
};

function applyCardEffect(cardId) {
    switch(cardId) {
        case 'joker1': cardEffects.critBonus += 3; break;
        case 'joker2': cardEffects.comboBonus = 5; break;
        case 'joker3': cardEffects.doubleCrit = true; break;
        case 'joker4': cardEffects.randomBonus += Math.floor(Math.random() * 6) + 2; break;
        case 'joker5': cardEffects.perCardBonus += 1; break;
        case 'joker6': cardEffects.missBonus += 3; break;
        default: break;
    }
}

function drawCard() {
    if (collectedCards.length >= 5) {
        showCardPopup('⚠️ 卡牌已满', '最多持有 5 张', '');
        return null;
    }
    const available = CARD_POOL.filter(c => !collectedCards.find(cc => cc.id === c.id));
    if (available.length === 0) {
        showCardPopup('📦 已集齐', '所有卡牌已收集！', '');
        return null;
    }
    const card = available[Math.floor(Math.random() * available.length)];
    collectedCards.push(card);
    applyCardEffect(card.id);
    updateCardSlot();
    updateHUD();
    showCardPopup(card.icon + ' ' + card.name, card.effect, card.desc);
    return card;
}

function showCardPopup(title, effect, sub) {
    const popup = document.getElementById('card-popup');
    document.getElementById('popupTitle').textContent = title;
    document.getElementById('popupEffect').textContent = effect;
    document.getElementById('popupSub').textContent = sub || '✦ 小丑牌 ✦';
    popup.classList.add('show');
    clearTimeout(popup._timer);
    popup._timer = setTimeout(() => popup.classList.remove('show'), 2200);
}

// ---- 右侧卡牌槽渲染 ----
function updateCardSlot() {
    const slot = document.getElementById('card-slot');
    slot.innerHTML = '';
    collectedCards.forEach((c, index) => {
        const div = document.createElement('div');
        div.className = 'slot-card';
        div.draggable = false;
        div.dataset.cardIndex = index;
        div.dataset.cardId = c.id;
        div.innerHTML = `<span class="icon">${c.icon}</span><span class="name">${c.name}</span>`;
        div.addEventListener('touchstart', handleTouchStart, { passive: false });
        div.addEventListener('touchmove', handleTouchMove, { passive: false });
        div.addEventListener('touchend', handleTouchEnd, { passive: false });
        div.addEventListener('mousedown', handleMouseDown);
        slot.appendChild(div);
    });
}

// ---- 拖拽状态 ----
let dragData = null;
let ghostElement = null;

function createGhost(cardId, icon, name) {
    const el = document.createElement('div');
    el.style.position = 'fixed';
    el.style.padding = '6px 12px';
    el.style.borderRadius = '30px';
    el.style.background = 'rgba(255,255,255,0.1)';
    el.style.backdropFilter = 'blur(12px)';
    el.style.border = '1px solid rgba(255,255,255,0.2)';
    el.style.color = '#88ddff';
    el.style.fontSize = '16px';
    el.style.fontFamily = "'VT323', monospace";
    el.style.pointerEvents = 'none';
    el.style.zIndex = '999';
    el.style.boxShadow = '0 4px 24px rgba(0,0,0,0.4)';
    el.innerHTML = `<span>${icon}</span> <span>${name}</span>`;
    el.dataset.cardId = cardId;
    return el;
}

let touchId = null;
function handleTouchStart(e) {
    const touch = e.touches[0];
    const cardEl = e.currentTarget;
    const cardId = cardEl.dataset.cardId;
    const card = CARD_POOL.find(c => c.id === cardId);
    if (!card) return;
    dragData = {
        cardId: cardId,
        cardIndex: parseInt(cardEl.dataset.cardIndex),
        offsetX: touch.clientX - cardEl.getBoundingClientRect().left,
        offsetY: touch.clientY - cardEl.getBoundingClientRect().top,
    };
    ghostElement = createGhost(cardId, card.icon, card.name);
    ghostElement.style.left = (touch.clientX - dragData.offsetX) + 'px';
    ghostElement.style.top = (touch.clientY - dragData.offsetY) + 'px';
    document.body.appendChild(ghostElement);
    touchId = touch.identifier;
    e.preventDefault();
}

function handleTouchMove(e) {
    if (!dragData || !ghostElement) return;
    const touch = Array.from(e.touches).find(t => t.identifier === touchId);
    if (!touch) return;
    ghostElement.style.left = (touch.clientX - dragData.offsetX) + 'px';
    ghostElement.style.top = (touch.clientY - dragData.offsetY) + 'px';
    const slots = document.querySelectorAll('.slot-place');
    slots.forEach(slot => {
        const rect = slot.getBoundingClientRect();
        const cx = touch.clientX;
        const cy = touch.clientY;
        const inside = cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
        slot.classList.toggle('drag-over', inside);
    });
    e.preventDefault();
}

function handleTouchEnd(e) {
    if (!dragData || !ghostElement) return;
    const touch = e.changedTouches[0];
    const slots = document.querySelectorAll('.slot-place');
    let targetSlot = null;
    slots.forEach(slot => {
        const rect = slot.getBoundingClientRect();
        const cx = touch.clientX;
        const cy = touch.clientY;
        if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
            targetSlot = slot;
        }
        slot.classList.remove('drag-over');
    });
    if (targetSlot) {
        const idx = parseInt(targetSlot.dataset.slotIndex);
        const cardId = dragData.cardId;
        if (slotStates.some(s => s === cardId)) {
            showCardPopup('⚠️ 重复', '该卡牌已放置', '');
        } else if (slotStates[idx]) {
            showCardPopup('⚠️ 槽位已满', '请先移除其他卡牌', '');
        } else {
            const cardObj = CARD_POOL.find(c => c.id === cardId);
            if (cardObj) {
                const collectedIdx = collectedCards.findIndex(c => c.id === cardId);
                if (collectedIdx !== -1) {
                    collectedCards.splice(collectedIdx, 1);
                    slotStates[idx] = cardId;
                    renderSlots();
                    updateCardSlot();
                    recalcCardEffects();
                    showCardPopup('✅ 放置成功', cardObj.icon + ' ' + cardObj.name, '已放入音游轴');
                }
            }
        }
    }
    if (ghostElement.parentNode) ghostElement.parentNode.removeChild(ghostElement);
    ghostElement = null;
    dragData = null;
    touchId = null;
    e.preventDefault();
}

function handleMouseDown(e) {
    const cardEl = e.currentTarget;
    const cardId = cardEl.dataset.cardId;
    const card = CARD_POOL.find(c => c.id === cardId);
    if (!card) return;
    const rect = cardEl.getBoundingClientRect();
    dragData = {
        cardId: cardId,
        cardIndex: parseInt(cardEl.dataset.cardIndex),
        offsetX: e.clientX - rect.left,
        offsetY: e.clientY - rect.top,
    };
    ghostElement = createGhost(cardId, card.icon, card.name);
    ghostElement.style.left = (e.clientX - dragData.offsetX) + 'px';
    ghostElement.style.top = (e.clientY - dragData.offsetY) + 'px';
    document.body.appendChild(ghostElement);

    const onMove = (ev) => {
        if (!dragData || !ghostElement) return;
        ghostElement.style.left = (ev.clientX - dragData.offsetX) + 'px';
        ghostElement.style.top = (ev.clientY - dragData.offsetY) + 'px';
        const slots = document.querySelectorAll('.slot-place');
        slots.forEach(slot => {
            const rect = slot.getBoundingClientRect();
            const cx = ev.clientX;
            const cy = ev.clientY;
            const inside = cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
            slot.classList.toggle('drag-over', inside);
        });
    };
    const onUp = (ev) => {
        if (!dragData || !ghostElement) return;
        const slots = document.querySelectorAll('.slot-place');
        let targetSlot = null;
        slots.forEach(slot => {
            const rect = slot.getBoundingClientRect();
            const cx = ev.clientX;
            const cy = ev.clientY;
            if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
                targetSlot = slot;
            }
            slot.classList.remove('drag-over');
        });
        if (targetSlot) {
            const idx = parseInt(targetSlot.dataset.slotIndex);
            const cardId = dragData.cardId;
            if (slotStates.some(s => s === cardId)) {
                showCardPopup('⚠️ 重复', '该卡牌已放置', '');
            } else if (slotStates[idx]) {
                showCardPopup('⚠️ 槽位已满', '请先移除其他卡牌', '');
            } else {
                const cardObj = CARD_POOL.find(c => c.id === cardId);
                if (cardObj) {
                    const collectedIdx = collectedCards.findIndex(c => c.id === cardId);
                    if (collectedIdx !== -1) {
                        collectedCards.splice(collectedIdx, 1);
                        slotStates[idx] = cardId;
                        renderSlots();
                        updateCardSlot();
                        recalcCardEffects();
                        showCardPopup('✅ 放置成功', cardObj.icon + ' ' + cardObj.name, '已放入音游轴');
                    }
                }
            }
        }
        if (ghostElement.parentNode) ghostElement.parentNode.removeChild(ghostElement);
        ghostElement = null;
        dragData = null;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}

// ---- 插槽系统 ----
const slotArea = document.getElementById('card-slot-area');
const NUM_SLOTS = 4;
let slotStates = [];

function initSlots() {
    slotArea.innerHTML = '';
    for (let i = 0; i < NUM_SLOTS; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot-place';
        slot.dataset.slotIndex = i;
        slot.textContent = '⬡';
        slotArea.appendChild(slot);
        slotStates.push(null);
    }
}
initSlots();

function renderSlots() {
    const slots = slotArea.querySelectorAll('.slot-place');
    slots.forEach((slot, i) => {
        const cardId = slotStates[i];
        if (cardId) {
            const card = CARD_POOL.find(c => c.id === cardId);
            if (card) {
                slot.className = 'slot-place dropped';
                slot.innerHTML = `<span class="card-icon">${card.icon}</span><span class="card-name">${card.name}</span>`;
                slot.style.cursor = 'default';
            }
        } else {
            slot.className = 'slot-place';
            slot.textContent = '⬡';
            slot.style.cursor = 'grab';
        }
    });
}

function recalcCardEffects() {
    cardEffects = {
        critBonus: 0,
        comboBonus: 0,
        doubleCrit: false,
        randomBonus: 0,
        perCardBonus: 0,
        missBonus: 0,
    };
    slotStates.forEach(cardId => {
        if (cardId) {
            applyCardEffect(cardId);
        }
    });
    updateHUD();
}

// ================================================================
//  3. 横向音游引擎 + 音符点击支持 + 双倍脉冲判定
// ================================================================
const game = {
    notes: [],
    speed: 1.0,
    spawnInterval: 900,
    lastSpawn: 0,
    isRunning: false,
    isPaused: false,
    score: 0,
    combo: 0,
    maxCombo: 0,
    formula: [],
    currentIndex: 0,
    container: document.getElementById('scroll-container-h'),
    judgeZone: document.getElementById('judge-zone'),
    scoreDisplay: document.getElementById('scoreDisplay'),
    comboDisplay: document.getElementById('comboDisplay'),
    statusDisplay: document.getElementById('statusDisplay'),
    critEffect: document.getElementById('crit-effect'),
    cardCountDisplay: document.getElementById('cardCountDisplay'),
    judgeX: 0,
};

function updateJudgeX() {
    const rect = game.judgeZone.getBoundingClientRect();
    const containerRect = game.container.getBoundingClientRect();
    game.judgeX = rect.left - containerRect.left + rect.width / 2;
}
updateJudgeX();
window.addEventListener('resize', updateJudgeX);

function updateHUD() {
    game.scoreDisplay.textContent = game.score;
    game.comboDisplay.textContent = game.combo;
    game.cardCountDisplay.textContent = collectedCards.length;
}

// ---- 处理音符点击（根据是否在判定区决定脉冲强度） ----
function processNoteClick(note) {
    if (note.judged) return;
    const char = note.char;
    note.judged = true;
    note.element.classList.remove('in-judge');
    note.element.classList.add('crit');

    // 计算分数
    let points = 10 + Math.floor(game.combo / 4) * 2;
    points += cardEffects.critBonus;
    if (cardEffects.doubleCrit) points *= 2;
    if (cardEffects.comboBonus > 0 && game.combo >= 5) points += cardEffects.comboBonus;
    if (cardEffects.randomBonus > 0) points += Math.floor(Math.random() * cardEffects.randomBonus) + 1;
    if (cardEffects.perCardBonus > 0) points += cardEffects.perCardBonus * collectedCards.length;

    // 精确判定额外加分（可选）
    if (note.active) points += 5;

    game.score += points;
    game.combo += 1;
    if (game.combo > game.maxCombo) game.maxCombo = game.combo;
    updateHUD();
    showCritEffect();
    game.statusDisplay.textContent = `⚡ CRIT! x${game.combo} +${points}`;

    // ===== 关键：根据是否在判定区决定脉冲强度 =====
    const pulseIntensity = note.active ? 2.0 : 1.0;
    if (window.__pulseArt) window.__pulseArt(pulseIntensity);

    // 旋转魔方
    if (['U','D','R','L','F','B'].includes(char)) {
        rotateFace(char, 1);
    }

    // 暴击抽卡
    if (Math.random() < 0.08 && collectedCards.length < 5) {
        setTimeout(() => drawCard(), 300);
    }

    // 延迟移除音符
    setTimeout(() => {
        if (note.element.parentNode) note.element.remove();
    }, 400);
    const idx = game.notes.indexOf(note);
    if (idx !== -1) game.notes.splice(idx, 1);
}

// ---- 创建音符（绑定点击事件） ----
function createNoteH(char) {
    const el = document.createElement('div');
    el.className = 'note-h';
    el.textContent = char;
    const containerRect = game.container.getBoundingClientRect();
    el.style.left = (containerRect.width - 30) + 'px';
    el.style.top = (20 + Math.random() * 60) + '%';
    game.container.appendChild(el);

    const noteObj = { char, element: el, x: parseFloat(el.style.left), active: false, judged: false };
    el.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        if (!game.isRunning || game.isPaused) return;
        if (noteObj.judged) return;
        processNoteClick(noteObj);
    });

    return noteObj;
}

// ---- 生成音符 ----
function spawnNoteH() {
    if (game.currentIndex >= game.formula.length) {
        game.statusDisplay.textContent = '✅ 完成!';
        game.isRunning = false;
        return;
    }
    const char = game.formula[game.currentIndex];
    const note = createNoteH(char);
    game.notes.push(note);
    game.currentIndex++;
}

// ---- 更新音符位置（仅移动和 miss 检查） ----
function updateNotesH() {
    if (game.isPaused || !game.isRunning) return;
    const containerWidth = game.container.getBoundingClientRect().width;
    const judgeX = game.judgeX;

    for (let i = game.notes.length - 1; i >= 0; i--) {
        const note = game.notes[i];
        note.x -= game.speed;
        note.element.style.left = note.x + 'px';
        const inJudge = Math.abs(note.x - judgeX) < 25;
        note.active = inJudge;
        note.element.classList.toggle('in-judge', inJudge);
        if (note.x < -60 && !note.judged) {
            note.judged = true;
            game.combo = 0;
            if (cardEffects.missBonus > 0) {
                game.score += cardEffects.missBonus;
                showCardPopup('🔥 余烬', `+${cardEffects.missBonus} 分`, '烈焰小丑触发');
            }
            game.statusDisplay.textContent = '❌ Miss';
            note.element.classList.add('miss');
            setTimeout(() => note.element.remove(), 300);
            game.notes.splice(i, 1);
            updateHUD();
        } else if (note.x < -60 && note.judged) {
            note.element.remove();
            game.notes.splice(i, 1);
        }
    }
    const hasActive = game.notes.some(n => n.active && !n.judged);
    game.judgeZone.classList.toggle('active', hasActive);
}

// ---- 按键处理（同样支持双倍脉冲） ----
function handleKeyPressH(char) {
    if (!game.isRunning || game.isPaused) return false;
    for (let i = 0; i < game.notes.length; i++) {
        const note = game.notes[i];
        if (!note.judged && note.char === char) {
            if (note.active || Math.abs(note.x - game.judgeX) < 60) {
                processNoteClick(note);
                return true;
            }
        }
    }
    return false;
}

// ---- 其他函数 ----
function startGame() {
    if (game.formula.length === 0) {
        loadFormula('U F R F D B');
    }
    game.isRunning = true;
    game.isPaused = false;
    game.lastSpawn = performance.now();
    game.statusDisplay.textContent = '▶ 运行中';
    game.notes.forEach(n => n.element.remove());
    game.notes = [];
    game.currentIndex = 0;
    spawnNoteH();
}

function togglePause() {
    if (!game.isRunning) return;
    game.isPaused = !game.isPaused;
    game.statusDisplay.textContent = game.isPaused ? '⏸ 暂停' : '▶ 运行中';
}

function resetGame() {
    game.isRunning = false;
    game.isPaused = false;
    game.notes.forEach(n => n.element.remove());
    game.notes = [];
    game.currentIndex = 0;
    game.score = 0;
    game.combo = 0;
    game.maxCombo = 0;
    queue.length = 0;
    slotStates.fill(null);
    renderSlots();
    recalcCardEffects();
    loadFormula('U F R F D B');
    updateHUD();
    game.statusDisplay.textContent = '⏸ 待命';
}

function loadFormula(str) {
    const cleaned = str.toUpperCase().replace(/\s+/g, ' ').trim();
    const chars = cleaned.split(' ').filter(c => c.length === 1 && 'UDFRLB'.includes(c));
    if (chars.length === 0) {
        game.statusDisplay.textContent = '⚠️ 无效公式';
        return false;
    }
    game.formula = chars;
    game.currentIndex = 0;
    game.notes.forEach(n => n.element.remove());
    game.notes = [];
    game.statusDisplay.textContent = `📝 ${chars.length} 步`;
    return true;
}

function showCritEffect() {
    const el = game.critEffect;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 700);
}

function gameLoopH(now) {
    if (game.isRunning && !game.isPaused) {
        if (game.currentIndex < game.formula.length) {
            if (now - game.lastSpawn > game.spawnInterval) {
                spawnNoteH();
                game.lastSpawn = now;
            }
        }
        updateNotesH();
    }
    requestAnimationFrame(gameLoopH);
}

// ================================================================
//  绑定 UI
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
    loadFormula('U F R F D B');
    updateHUD();
    updateCardSlot();
    updateJudgeX();
    renderSlots();

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    document.getElementById('scrambleBtn').addEventListener('click', () => {
        const faces = ['U','D','R','L','F','B'];
        for (let i = 0; i < 20; i++) {
            const face = faces[Math.floor(Math.random() * faces.length)];
            setTimeout(() => {
                rotateFace(face, 1);
                if (window.__pulseArt) window.__pulseArt(1.0);
            }, i * 120);
        }
    });

    document.getElementById('cardTestBtn').addEventListener('click', drawCard);

    document.addEventListener('keydown', (e) => {
        const key = e.key.toUpperCase();
        if (game.isRunning && !game.isPaused) {
            const handled = handleKeyPressH(key);
            if (handled) { e.preventDefault(); return; }
        }
        if (['U','F','R','D','B','L'].includes(key)) {
            e.preventDefault();
            rotateFace(key, 1);
            if (window.__pulseArt) window.__pulseArt(1.0);
        }
        if (key === ' ' || key === 'SPACE') {
            e.preventDefault();
            togglePause();
        }
        if (key === 'C' && e.ctrlKey) {
            e.preventDefault();
            drawCard();
        }
    });

    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        updateJudgeX();
    });
});

requestAnimationFrame(gameLoopH);

console.log('✦ RHYTHM·CUBE · 双倍脉冲版 ✦');
console.log('   ⌨️  U F R D B L  → 旋转 / 判定');
console.log('   🃏  暴击抽卡，拖拽卡牌到插槽');
console.log('   🔄  点击「自转」开关自动旋转');
console.log('   👆  点击音符，精确判定区内触发双倍脉冲');
